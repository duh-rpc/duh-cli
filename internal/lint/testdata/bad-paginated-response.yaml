openapi: 3.0.0
info:
  title: Bad Paginated Response
  version: 1.0.0

servers:
  - url: https://api.example.com/v1

paths:
  /pets.list:
    post:
      operationId: listPets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetails'

components:
  schemas:
    ListRequest:
      type: object
      properties:
        page:
          $ref: '#/components/schemas/PageRequest'

    PageRequest:
      type: object
      properties:
        first:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        after:
          type: string

    ListResponse:
      type: object
      properties:
        results:
          type: string

    ErrorDetails:
      type: object
      required: [message]
      properties:
        message:
          type: string
