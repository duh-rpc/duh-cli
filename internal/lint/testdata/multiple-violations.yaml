openapi: 3.0.0
info:
  title: Multiple Violations
  version: 1.0.0
  description: Spec with multiple DUH-RPC violations for testing

paths:
  /api/users/create:  # VIOLATION: bad path format
    get:  # VIOLATION: wrong HTTP method
      operationId: createUser
      parameters:
        - name: userId  # VIOLATION: query parameter
          in: query
          schema:
            type: string
      responses:
        201:
          description: Created
          content:
            application/xml:  # VIOLATION: invalid content type
              schema:
                type: object
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                # VIOLATION: bad error schema (missing required field: message)
                properties:
                  error:
                    type: string

  /v1/products.list:  # VIOLATION: PATH_NO_VERSION_PREFIX
    post:
      # VIOLATION: missing request body
      responses:
        200:
          description: Success
          # VIOLATION: missing content in 200 response
        204:  # VIOLATION: invalid status code
          description: No Content
          content:
            application/json:
              schema:
                type: object
        500:
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

  /orders.create:
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BadPayload'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResult'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

  /orders.update:
    post:
      operationId: updateOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BadPayload'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResult'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

  /items.list:
    post:
      operationId: listItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: object
                  properties:
                    first:
                      type: string
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

  /user_accounts.create:
    post:
      operationId: createUserAccounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAccountsCreateRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccountsCreateResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

  /pet.get:
    post:
      operationId: getPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetGetRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetGetResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

  /users/{id}/posts/{postId}:
    post:
      operationId: getUserPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetPostRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPostResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

components:
  schemas:
    BadPayload:
      type: object
      properties:
        name:
          type: string

    BadResult:
      type: object
      additionalProperties: false
      required: [orderId]
      properties:
        orderId:
          type: string
        note:
          type: string
          nullable: true

    ProtoViolationInteger:
      type: object
      properties:
        count:
          type: integer

    ProtoViolationNullable:
      type: object
      properties:
        status:
          type: string
          nullable: true

    ProtoViolationNestedArray:
      type: object
      properties:
        matrix:
          type: array
          items:
            type: array
            items:
              type: string

    ProtoViolationAdditionalProps:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string

    ProtoViolationOneOf:
      oneOf:
        - type: object
          properties:
            a:
              type: string
        - type: object
          properties:
            b:
              type: string

    UserAccountsCreateRequest:
      type: object
      properties:
        name:
          type: string

    UserAccountsCreateResponse:
      type: object
      properties:
        accountId:
          type: string

    PetGetRequest:
      type: object
      properties:
        petId:
          type: string

    PetGetResponse:
      type: object
      properties:
        petId:
          type: string

    GetPostRequest:
      type: object
      properties:
        includeComments:
          type: boolean

    GetPostResponse:
      type: object
      properties:
        postId:
          type: string

    SchemaViolationCamelCase:
      type: object
      properties:
        first_name:
          type: string

    SchemaViolationNullSyntax:
      type: object
      properties:
        name:
          type:
            - string
            - "null"
