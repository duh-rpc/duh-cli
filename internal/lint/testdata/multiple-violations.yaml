openapi: 3.0.0
info:
  title: Multiple Violations
  version: 1.0.0
  description: Spec with multiple DUH-RPC violations for testing

paths:
  /api/users/create:  # VIOLATION: bad path format
    get:  # VIOLATION: wrong HTTP method
      operationId: createUser
      parameters:
        - name: userId  # VIOLATION: query parameter
          in: query
          schema:
            type: string
      responses:
        201:
          description: Created
          content:
            application/xml:  # VIOLATION: invalid content type
              schema:
                type: object
        400:
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                # VIOLATION: bad error schema (missing required field: message)
                properties:
                  error:
                    type: string

  /v1/products.list:  # VIOLATION: PATH_NO_VERSION_PREFIX
    post:
      # VIOLATION: missing request body
      responses:
        200:
          description: Success
          # VIOLATION: missing content in 200 response
        204:  # VIOLATION: invalid status code
          description: No Content
          content:
            application/json:
              schema:
                type: object
        500:
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

  /orders.create:
    post:
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BadPayload'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResult'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

  /orders.update:
    post:
      operationId: updateOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BadPayload'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResult'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

components:
  schemas:
    BadPayload:
      type: object
      properties:
        name:
          type: string

    BadResult:
      type: object
      properties:
        orderId:
          type: string
