openapi: 3.0.0
info:
  title: Invalid Status Codes
  version: 1.0.0
paths:
  /users.create:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        204:  # Not allowed
          description: No Content
        503:  # Not allowed, should be 500
          description: Service Unavailable
          content:
            application/json:
              schema:
                type: object
