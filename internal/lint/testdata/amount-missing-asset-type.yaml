openapi: 3.0.0
info:
  title: Amount Missing Asset Type
  version: 1.0.0

servers:
  - url: https://api.example.com/v1

paths:
  /payments.create:
    post:
      description: Create a payment
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetails'

components:
  schemas:
    CreateRequest:
      type: object
      properties:
        amount:
          description: Payment amount
          type: string
        name:
          description: Payment name
          type: string

    CreateResponse:
      type: object
      properties:
        paymentId:
          description: ID of the payment
          type: string

    ErrorDetails:
      type: object
      required: [message]
      properties:
        message:
          description: Error message
          type: string
