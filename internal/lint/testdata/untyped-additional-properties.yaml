openapi: 3.0.0
info:
  title: Untyped Additional Properties
  version: 1.0.0

servers:
  - url: https://api.example.com/v1

paths:
  /pets.create:
    post:
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetails'

components:
  schemas:
    CreateRequest:
      type: object
      properties:
        name:
          type: string

    CreateResponse:
      type: object
      additionalProperties: true
      properties:
        status:
          type: string

    ErrorDetails:
      type: object
      required: [message]
      properties:
        message:
          type: string
