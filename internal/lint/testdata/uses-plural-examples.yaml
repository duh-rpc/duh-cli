openapi: 3.0.0
info:
  title: Uses Plural Examples
  version: 1.0.0

servers:
  - url: https://api.example.com/v1

paths:
  /pets.create:
    post:
      description: Create a pet
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
            examples:
              example1:
                summary: A dog
                value:
                  name: Rex
              example2:
                summary: A cat
                value:
                  name: Whiskers
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetails'

components:
  schemas:
    CreateRequest:
      type: object
      properties:
        name:
          description: Name of the pet
          type: string

    CreateResponse:
      type: object
      properties:
        petId:
          description: ID of the pet
          type: string

    ErrorDetails:
      type: object
      required: [message]
      properties:
        message:
          description: Error message
          type: string
