openapi: 3.0.0
info:
  title: Bad Pagination Params
  version: 1.0.0

servers:
  - url: https://api.example.com/v1

paths:
  /pets.list:
    post:
      operationId: listPets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetails'

components:
  schemas:
    ListRequest:
      type: object
      properties:
        page:
          type: object
          properties:
            first:
              type: string
            after:
              type: integer
              format: int32

    ListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Pet'
        page:
          $ref: '#/components/schemas/PageResponse'

    PageResponse:
      type: object
      properties:
        endCursor:
          type: string

    Pet:
      type: object
      properties:
        name:
          type: string

    ErrorDetails:
      type: object
      required: [message]
      properties:
        message:
          type: string
