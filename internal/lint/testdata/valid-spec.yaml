openapi: "3.0.3"
info:
  title: Valid DUH-RPC API
  version: 1.0.0
  description: Fully compliant DUH-RPC specification

servers:
  - url: https://api.example.com/v1

paths:
  /pets.list:
    post:
      operationId: listPets
      description: List pets with optional filtering
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetails'

  /pets.create:
    post:
      operationId: createPet
      description: Create a new pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetails'

components:
  schemas:
    ListRequest:
      type: object
      properties:
        page:
          $ref: '#/components/schemas/PageRequest'
        status:
          type: string

    PageRequest:
      type: object
      properties:
        first:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        after:
          type: string

    ListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Pet'
        page:
          $ref: '#/components/schemas/PageResponse'

    PageResponse:
      type: object
      required: [endCursor]
      properties:
        endCursor:
          type: string

    CreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        status:
          type: string

    CreateResponse:
      type: object
      required: [petId, name]
      properties:
        petId:
          type: string
        name:
          type: string
        status:
          type: string

    Pet:
      type: object
      required: [petId, name]
      properties:
        petId:
          type: string
        name:
          type: string
        status:
          type: string

    ErrorDetails:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: string
        type:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
