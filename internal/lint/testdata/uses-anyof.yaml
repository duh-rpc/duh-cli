openapi: 3.0.0
info:
  title: Uses AnyOf
  version: 1.0.0

servers:
  - url: https://api.example.com/v1

paths:
  /pets.create:
    post:
      description: Create a pet
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetails'

components:
  schemas:
    CreateRequest:
      type: object
      properties:
        name:
          description: Name of the pet
          type: string

    CreateResponse:
      anyOf:
        - type: object
          properties:
            petId:
              type: string
        - type: object
          properties:
            error:
              type: string

    ErrorDetails:
      type: object
      required: [message]
      properties:
        message:
          description: Error message
          type: string
